spring:
  application:
    name: api-teste
  # ===============================
  # = H2 DATABASE
  # ===============================
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8383

# ===============================
# = ACTUATOR
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: [ "prometheus", "health"]
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  # ===============================
  # = OPENZIPKIN
  # ===============================
  tracing:
    enabled: true
    sampling:
      probability: 0.2   # 20% das requisições são amostradas
  zipkin:
    tracing:
      endpoint: ${URL_OPENZIPKIN:http://192.168.0.100:9411/api/v2/spans}
# ===============================
# = LogBack e LOKI
# ===============================

logging:
  loki:
    url: ${URL_LOKI:http://192.168.0.100:3100/loki/api/v1/push}
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ===============================
# = Variaveis de ambiente para outros serviços
# ===============================

apps:
  Loki:
    url: ${URL_LOKI:http://192.168.0.100:3100/loki/api/v1/push}
