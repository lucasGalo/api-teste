apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-teste
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-teste
  template:
    metadata:
      labels:
        app: api-teste
    spec:
      containers:
        - name: api-teste
          image: lucasgalo/api-teste:0.1.2   # substitua pela sua imagem
          ports:
            - containerPort: 8383
---
apiVersion: v1
kind: Service
metadata:
  name: api-teste
spec:
  type: NodePort
  selector:
    app: api-teste
  ports:
    - port: 8383        # porta interna do pod
      targetPort: 8383  # porta do container
      nodePort: 30083   # porta externa válida (faixa 30000–32767)
      protocol: TCP
      name: http
